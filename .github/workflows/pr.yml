name: PR

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install OCR renderer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr pango1.0-tools fonts-dejavu-core

      - name: Metadata
        run: cargo metadata --no-deps --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: CLI closed-loop check
        run: ./scripts/ci/check-cli-closed-loop.sh

      - name: Daemon closed-loop check
        run: ./scripts/ci/check-daemon-closed-loop.sh

      - name: Daemon incremental import check
        run: ./scripts/ci/check-daemon-incremental-import.sh

      - name: License check
        run: ./scripts/ci/check-licenses.sh

      - name: Runbook check
        run: ./scripts/ci/check-runbooks.sh

      - name: Current-stage handoff check
        run: ./scripts/ci/check-current-stage-handoff.sh

      - name: Workflow check
        run: ./scripts/ci/check-workflows.sh

      - name: Benchmark smoke
        run: ./scripts/ci/check-benchmark-smoke.sh

  contract_check:
    name: contract-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run contract check
        run: python3 scripts/ci/check-performance-contracts.py

  privacy_guard:
    name: privacy-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run privacy guard
        run: python3 scripts/ci/check-private-evidence-redaction.py

  pr_budget:
    name: pr-budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run PR budget check
        run: python3 scripts/ci/check-pr-budget.py

  benchmark_lane_claims:
    name: benchmark-lane-claims
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run benchmark lane claims check
        run: python3 scripts/ci/check-benchmark-lanes.py

  gate_integrity:
    name: gate-integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gate integrity check
        run: python3 scripts/ci/check-gate-integrity.py

  public_repo_guard:
    name: public-repo-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run public repository guard
        run: ./scripts/ci/guard-public-repo.sh
