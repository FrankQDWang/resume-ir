name: PR

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install OCR renderer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr pango1.0-tools fonts-dejavu-core

      - name: Metadata
        run: cargo metadata --no-deps --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: License check
        run: ./scripts/ci/check-licenses.sh

      - name: Runbook check
        run: ./scripts/ci/check-runbooks.sh

      - name: Workflow check
        run: ./scripts/ci/check-workflows.sh

      - name: Benchmark smoke
        run: |
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- synthetic-query --documents 24 --queries 6 --top-k 5 --json > benchmark-smoke.json
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- gate --report benchmark-smoke.json --allow-synthetic --min-documents 24 --min-queries 6 --max-p95-ms 1000 --max-zero-result-queries 0
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          printf '%s\n' '#!/usr/bin/env sh' 'printf "resume-ir-ocr-v1\nconfidence=0.97\ntext:\nSynthetic OCR smoke page %s\n" "$RESUME_IR_OCR_PAGE_NO"' > "$tmpdir/ocr-fixture.sh"
          chmod 700 "$tmpdir/ocr-fixture.sh"
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- ocr-throughput --command "$tmpdir/ocr-fixture.sh" --pages 3 --page-timeout-ms 5000 --json > ocr-benchmark-smoke.json
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- ocr-gate --report ocr-benchmark-smoke.json --allow-synthetic --min-pages 3 --max-p95-ms 5000 --min-pages-per-second 0.001
          cat > "$tmpdir/embedding-fixture.sh" <<'SH'
          #!/usr/bin/env sh
          printf 'resume-ir-embedding-v1\n'
          printf 'model_id=%s\n' "$RESUME_IR_EMBEDDING_MODEL_ID"
          printf 'dimension=%s\n' "$RESUME_IR_EMBEDDING_DIMENSION"
          awk '
            /^input=/ {
              split(substr($0, 7), parts, "\t");
              id = parts[1];
              if (id ~ /^query-000000/ || id ~ /^candidate-000000-000000/) {
                vector = "1.0,0.0,0.0";
              } else if (id ~ /^query-000001/ || id ~ /^candidate-000001-000000/) {
                vector = "0.0,1.0,0.0";
              } else {
                vector = "0.0,0.0,1.0";
              }
              printf "vector=%s\t%s\n", id, vector;
            }
          ' "$RESUME_IR_EMBEDDING_INPUT_PATH"
          SH
          chmod 700 "$tmpdir/embedding-fixture.sh"
          cat > "$tmpdir/vector-dataset.jsonl" <<'JSONL'
          {"query":"Backend Java payment search","candidates":[{"id":"java-match","text":"Java payment backend search engineer","relevant":true},{"id":"sales-miss","text":"Sales operations recruiter","relevant":false}]}
          {"query":"Rust indexing platform","candidates":[{"id":"rust-match","text":"Rust indexing platform engineer","relevant":true},{"id":"hr-miss","text":"HR business partner","relevant":false}]}
          JSONL
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- vector-quality --dataset "$tmpdir/vector-dataset.jsonl" --command "$tmpdir/embedding-fixture.sh" --model-id fixture-local-model --dimension 3 --top-k 1 --json > vector-benchmark-smoke.json
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- vector-gate --report vector-benchmark-smoke.json --min-samples 2 --min-recall-at-k 0.99 --min-mrr 0.99 --min-ndcg-at-k 0.99 --max-zero-recall-queries 0

      - name: Public repository guard
        run: ./scripts/ci/guard-public-repo.sh
