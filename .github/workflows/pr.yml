name: PR

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install OCR renderer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr pango1.0-tools fonts-dejavu-core

      - name: Metadata
        run: cargo metadata --no-deps --locked

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Tests
        run: cargo test --workspace --locked

      - name: License check
        run: ./scripts/ci/check-licenses.sh

      - name: Runbook check
        run: ./scripts/ci/check-runbooks.sh

      - name: Workflow check
        run: ./scripts/ci/check-workflows.sh

      - name: Benchmark smoke
        run: |
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- synthetic-query --documents 24 --queries 6 --top-k 5 --json > benchmark-smoke.json
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- gate --report benchmark-smoke.json --allow-synthetic --min-documents 24 --min-queries 6 --max-p95-ms 1000 --max-zero-result-queries 0
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          printf '%s\n' '#!/usr/bin/env sh' 'printf "resume-ir-ocr-v1\nconfidence=0.97\ntext:\nSynthetic OCR smoke page %s\n" "$RESUME_IR_OCR_PAGE_NO"' > "$tmpdir/ocr-fixture.sh"
          chmod 700 "$tmpdir/ocr-fixture.sh"
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- ocr-throughput --command "$tmpdir/ocr-fixture.sh" --pages 3 --page-timeout-ms 5000 --json > ocr-benchmark-smoke.json
          cargo run -p benchmark-runner --bin resume-benchmark --locked -- ocr-gate --report ocr-benchmark-smoke.json --allow-synthetic --min-pages 3 --max-p95-ms 5000 --min-pages-per-second 0.001

      - name: Public repository guard
        run: ./scripts/ci/guard-public-repo.sh
