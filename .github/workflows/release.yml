name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  dry-run:
    name: release dry run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate version input
        run: |
          case "${{ inputs.version }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "version must look like vX.Y.Z" >&2; exit 1 ;;
          esac

      - name: Verify workspace
        run: ./scripts/ci/verify-local.sh

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Create release artifact manifest
        run: |
          scripts/release/create-artifact-manifest.sh \
            --version "${{ inputs.version }}" \
            --target-dir target/release \
            --out-dir release-dry-run

      - name: Create release SBOM
        run: |
          scripts/release/create-sbom.sh \
            --version "${{ inputs.version }}" \
            --out-dir release-dry-run

      - name: Check public artifact boundary
        run: |
          test ! -d local-data
          test ! -d diagnostics
          test ! -d model-cache
          test -f release-dry-run/release-artifacts.json
          test -f release-dry-run/release-sbom.json

      - name: Upload release dry-run manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-dry-run
          path: release-dry-run/*.json

      - name: Release gate
        run: |
          echo "Packaging, signing, notarization, and GitHub Release upload are gated until explicit release approval."

  macos-package-dry-run:
    name: macOS package dry run
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate version input
        run: |
          case "${{ inputs.version }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "version must look like vX.Y.Z" >&2; exit 1 ;;
          esac

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Create unsigned macOS package dry run
        run: |
          scripts/release/create-macos-package.sh \
            --version "${{ inputs.version }}" \
            --target-dir target/release \
            --out-dir macos-package-dry-run

      - name: Check macOS package boundary
        run: |
          test ! -d local-data
          test ! -d diagnostics
          test ! -d model-cache
          test -f macos-package-dry-run/macos-package.json
          test -f macos-package-dry-run/resume-ir-${{ inputs.version }}-macos.pkg
          test -f macos-package-dry-run/resume-ir-${{ inputs.version }}-macos.dmg
          hdiutil verify macos-package-dry-run/resume-ir-${{ inputs.version }}-macos.dmg
          grep -F '"packaging_status": "unsigned_dry_run"' macos-package-dry-run/macos-package.json
          grep -F '"signing_status": "unsigned"' macos-package-dry-run/macos-package.json
          grep -F '"notarization_status": "not_requested"' macos-package-dry-run/macos-package.json

      - name: Upload unsigned macOS package dry run
        uses: actions/upload-artifact@v7
        with:
          name: macos-package-dry-run
          path: macos-package-dry-run/*

      - name: Release gate
        run: |
          echo "Signing, notarization, installer lifecycle validation, Windows MSI, and GitHub Release upload are gated until explicit release approval."
