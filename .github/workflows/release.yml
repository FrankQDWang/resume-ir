name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  dry-run:
    name: release dry run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate version input
        run: |
          case "${{ inputs.version }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "version must look like vX.Y.Z" >&2; exit 1 ;;
          esac

      - name: Verify workspace
        run: ./scripts/ci/verify-local.sh

      - name: Confirm stable release remains blocked
        run: ./scripts/ci/check-release-readiness.sh

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Create release artifact manifest
        run: |
          scripts/release/create-artifact-manifest.sh \
            --version "${{ inputs.version }}" \
            --target-dir target/release \
            --out-dir release-dry-run

      - name: Create blocked signing evidence manifest
        run: |
          scripts/release/create-signing-evidence.sh \
            --version "${{ inputs.version }}" \
            --artifact-manifest release-dry-run/release-artifacts.json \
            --out-dir release-dry-run

      - name: Create release SBOM
        run: |
          scripts/release/create-sbom.sh \
            --version "${{ inputs.version }}" \
            --out-dir release-dry-run

      - name: Create blocked GitHub Release publication evidence manifest
        run: |
          scripts/release/create-release-publication-evidence.sh \
            --version "${{ inputs.version }}" \
            --artifact-manifest release-dry-run/release-artifacts.json \
            --out-dir release-dry-run

      - name: Check public artifact boundary
        run: |
          test ! -d local-data
          test ! -d diagnostics
          test ! -d model-cache
          test -f release-dry-run/release-artifacts.json
          test -f release-dry-run/signing-evidence.json
          test -f release-dry-run/release-sbom.json
          test -f release-dry-run/release-publication-evidence.json
          grep -F '"signing_status": "blocked"' release-dry-run/signing-evidence.json
          grep -F '"evidence_boundary": "dry_run_no_signing_material"' release-dry-run/signing-evidence.json
          grep -F '"publication_status": "blocked"' release-dry-run/release-publication-evidence.json
          grep -F '"evidence_boundary": "dry_run_no_release_publication"' release-dry-run/release-publication-evidence.json
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' release-dry-run/release-artifacts.json; then
            echo "release artifact manifest leaked a local path or runtime-data marker" >&2
            exit 1
          fi
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' release-dry-run/signing-evidence.json; then
            echo "signing evidence manifest leaked a local path or runtime-data marker" >&2
            exit 1
          fi
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' release-dry-run/release-sbom.json; then
            echo "release SBOM leaked a local path or runtime-data marker" >&2
            exit 1
          fi
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' release-dry-run/release-publication-evidence.json; then
            echo "release publication evidence manifest leaked a local path or runtime-data marker" >&2
            exit 1
          fi

      - name: Upload release dry-run manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-dry-run
          path: release-dry-run/*.json

      - name: Release gate
        run: |
          echo "Packaging, signing, notarization, and GitHub Release upload are gated until explicit release approval."

  macos-package-dry-run:
    name: macOS package dry run
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate version input
        run: |
          case "${{ inputs.version }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "version must look like vX.Y.Z" >&2; exit 1 ;;
          esac

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Create unsigned macOS package dry run
        run: |
          scripts/release/create-macos-package.sh \
            --version "${{ inputs.version }}" \
            --target-dir target/release \
            --out-dir macos-package-dry-run

      - name: Create blocked macOS installer evidence manifest
        run: |
          scripts/release/create-macos-installer-evidence.sh \
            --version "${{ inputs.version }}" \
            --macos-package-manifest macos-package-dry-run/macos-package.json \
            --out-dir macos-package-dry-run

      - name: Create macOS installer lifecycle dry-run plan
        run: |
          scripts/release/run-macos-installer-lifecycle.sh \
            --version "${{ inputs.version }}" \
            --macos-package-manifest macos-package-dry-run/macos-package.json \
            --out macos-package-dry-run/macos-installer-lifecycle-dry-run.json \
            --dry-run

      - name: Create blocked macOS notarization evidence manifest
        run: |
          scripts/release/create-notarization-evidence.sh \
            --version "${{ inputs.version }}" \
            --macos-package-manifest macos-package-dry-run/macos-package.json \
            --out-dir macos-package-dry-run

      - name: Check macOS package boundary
        run: |
          test ! -d local-data
          test ! -d diagnostics
          test ! -d model-cache
          test -f macos-package-dry-run/macos-package.json
          test -f macos-package-dry-run/macos-installer-evidence.json
          test -f macos-package-dry-run/macos-installer-lifecycle-dry-run.json
          test -f macos-package-dry-run/notarization-evidence.json
          test -f macos-package-dry-run/resume-ir-${{ inputs.version }}-macos.pkg
          test -f macos-package-dry-run/resume-ir-${{ inputs.version }}-macos.dmg
          scripts/release/verify-macos-dmg.sh macos-package-dry-run/resume-ir-${{ inputs.version }}-macos.dmg
          grep -F '"packaging_status": "unsigned_dry_run"' macos-package-dry-run/macos-package.json
          grep -F '"signing_status": "unsigned"' macos-package-dry-run/macos-package.json
          grep -F '"notarization_status": "not_requested"' macos-package-dry-run/macos-package.json
          grep -F '"installer_lifecycle_status": "blocked"' macos-package-dry-run/macos-installer-evidence.json
          grep -F '"evidence_boundary": "dry_run_no_macos_installer_execution"' macos-package-dry-run/macos-installer-evidence.json
          grep -F '"launch_agent_validation_status": "blocked"' macos-package-dry-run/macos-installer-evidence.json
          grep -F '"schema_version": "release.macos_installer_lifecycle_plan.v1"' macos-package-dry-run/macos-installer-lifecycle-dry-run.json
          grep -F '"execution_mode": "dry_run"' macos-package-dry-run/macos-installer-lifecycle-dry-run.json
          grep -F '"installer_lifecycle_status": "blocked"' macos-package-dry-run/macos-installer-lifecycle-dry-run.json
          grep -F '"notarization_status": "blocked"' macos-package-dry-run/notarization-evidence.json
          grep -F '"evidence_boundary": "dry_run_no_notarization_credentials"' macos-package-dry-run/notarization-evidence.json
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' macos-package-dry-run/macos-package.json; then
            echo "macOS package manifest leaked a local path or runtime-data marker" >&2
            exit 1
          fi
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' macos-package-dry-run/macos-installer-evidence.json; then
            echo "macOS installer evidence manifest leaked a local path or runtime-data marker" >&2
            exit 1
          fi
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' macos-package-dry-run/macos-installer-lifecycle-dry-run.json; then
            echo "macOS installer lifecycle dry-run plan leaked a local path or runtime-data marker" >&2
            exit 1
          fi
          if grep -Eq 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' macos-package-dry-run/notarization-evidence.json; then
            echo "macOS notarization evidence manifest leaked a local path or runtime-data marker" >&2
            exit 1
          fi

      - name: Upload unsigned macOS package dry run
        uses: actions/upload-artifact@v7
        with:
          name: macos-package-dry-run
          path: macos-package-dry-run/*

      - name: Release gate
        run: |
          echo "Signing, notarization, installer lifecycle validation, Windows MSI, and GitHub Release upload are gated until explicit release approval."

  windows-package-dry-run:
    name: Windows package dry run
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          $dotnetTools = Join-Path $env:USERPROFILE ".dotnet\tools"
          Add-Content -Path $env:GITHUB_PATH -Value $dotnetTools
          $env:PATH = "$dotnetTools;$env:PATH"
          wix --version

      - name: Validate version input
        shell: pwsh
        run: |
          if ("${{ inputs.version }}" -notmatch '^v[0-9]+[.][0-9]+[.][0-9]+$') {
            Write-Error "version must look like vX.Y.Z"
            exit 1
          }

      - name: Build release binaries
        run: cargo build --workspace --release --locked

      - name: Create unsigned Windows MSI dry run
        shell: pwsh
        run: |
          scripts/release/create-windows-package.ps1 `
            -Version "${{ inputs.version }}" `
            -TargetDir target/release `
            -OutDir windows-package-dry-run

      - name: Create blocked Windows installer evidence manifest
        shell: bash
        run: |
          scripts/release/create-windows-installer-evidence.sh \
            --version "${{ inputs.version }}" \
            --windows-package-manifest windows-package-dry-run/windows-package.json \
            --out-dir windows-package-dry-run

      - name: Create Windows installer lifecycle dry-run plan
        shell: pwsh
        run: |
          scripts/release/run-windows-installer-lifecycle.ps1 `
            -Version "${{ inputs.version }}" `
            -WindowsPackageManifest windows-package-dry-run/windows-package.json `
            -Out windows-package-dry-run/windows-installer-lifecycle-dry-run.json `
            -DryRun

      - name: Create blocked Windows service evidence manifest
        shell: bash
        run: |
          scripts/release/create-windows-service-evidence.sh \
            --version "${{ inputs.version }}" \
            --windows-package-manifest windows-package-dry-run/windows-package.json \
            --out-dir windows-package-dry-run

      - name: Create Windows service lifecycle dry-run plan
        shell: pwsh
        run: |
          scripts/release/run-windows-service-lifecycle.ps1 `
            -Version "${{ inputs.version }}" `
            -WindowsPackageManifest windows-package-dry-run/windows-package.json `
            -Out windows-package-dry-run/windows-service-lifecycle-dry-run.json `
            -DryRun

      - name: Check Windows package boundary
        shell: pwsh
        run: |
          foreach ($path in @("local-data", "diagnostics", "model-cache")) {
            if (Test-Path -LiteralPath $path) {
              Write-Error "$path must not exist in release dry-run workspace"
              exit 1
            }
          }
          $manifest = "windows-package-dry-run/windows-package.json"
          $installerEvidence = "windows-package-dry-run/windows-installer-evidence.json"
          $installerLifecycle = "windows-package-dry-run/windows-installer-lifecycle-dry-run.json"
          $serviceEvidence = "windows-package-dry-run/windows-service-evidence.json"
          $serviceLifecycle = "windows-package-dry-run/windows-service-lifecycle-dry-run.json"
          $msi = "windows-package-dry-run/resume-ir-${{ inputs.version }}-windows.msi"
          if (-not (Test-Path -LiteralPath $manifest -PathType Leaf)) { exit 1 }
          if (-not (Test-Path -LiteralPath $installerEvidence -PathType Leaf)) { exit 1 }
          if (-not (Test-Path -LiteralPath $installerLifecycle -PathType Leaf)) { exit 1 }
          if (-not (Test-Path -LiteralPath $serviceEvidence -PathType Leaf)) { exit 1 }
          if (-not (Test-Path -LiteralPath $serviceLifecycle -PathType Leaf)) { exit 1 }
          if (-not (Test-Path -LiteralPath $msi -PathType Leaf)) { exit 1 }
          Select-String -LiteralPath $manifest -SimpleMatch '"packaging_status": "unsigned_dry_run"'
          Select-String -LiteralPath $manifest -SimpleMatch '"installer_kind": "msi"'
          Select-String -LiteralPath $manifest -SimpleMatch '"signing_status": "unsigned"'
          Select-String -LiteralPath $installerEvidence -SimpleMatch '"installer_lifecycle_status": "blocked"'
          Select-String -LiteralPath $installerEvidence -SimpleMatch '"evidence_boundary": "dry_run_no_windows_installer_execution"'
          Select-String -LiteralPath $installerLifecycle -SimpleMatch '"schema_version": "release.windows_installer_lifecycle_plan.v1"'
          Select-String -LiteralPath $installerLifecycle -SimpleMatch '"execution_mode": "dry_run"'
          Select-String -LiteralPath $installerLifecycle -SimpleMatch '"installer_lifecycle_status": "blocked"'
          Select-String -LiteralPath $serviceEvidence -SimpleMatch '"service_lifecycle_status": "blocked"'
          Select-String -LiteralPath $serviceEvidence -SimpleMatch '"evidence_boundary": "dry_run_no_windows_service_registration"'
          Select-String -LiteralPath $serviceLifecycle -SimpleMatch '"schema_version": "release.windows_service_lifecycle_plan.v1"'
          Select-String -LiteralPath $serviceLifecycle -SimpleMatch '"execution_mode": "dry_run"'
          Select-String -LiteralPath $serviceLifecycle -SimpleMatch '"service_lifecycle_status": "blocked"'
          if (Select-String -LiteralPath $manifest -Pattern 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' -Quiet) {
            Write-Error "Windows package manifest leaked a local path or runtime-data marker"
            exit 1
          }
          if (Select-String -LiteralPath $installerEvidence -Pattern 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' -Quiet) {
            Write-Error "Windows installer evidence manifest leaked a local path or runtime-data marker"
            exit 1
          }
          if (Select-String -LiteralPath $installerLifecycle -Pattern 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' -Quiet) {
            Write-Error "Windows installer lifecycle dry-run plan leaked a local path or runtime-data marker"
            exit 1
          }
          if (Select-String -LiteralPath $serviceEvidence -Pattern 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' -Quiet) {
            Write-Error "Windows service evidence manifest leaked a local path or runtime-data marker"
            exit 1
          }
          if (Select-String -LiteralPath $serviceLifecycle -Pattern 'manifest_path|src_path|license_file|/Users/|target/release|local-data|diagnostics|model-cache' -Quiet) {
            Write-Error "Windows service lifecycle dry-run plan leaked a local path or runtime-data marker"
            exit 1
          }

      - name: Upload unsigned Windows package dry run
        uses: actions/upload-artifact@v7
        with:
          name: windows-package-dry-run
          path: windows-package-dry-run/*

      - name: Release gate
        shell: pwsh
        run: |
          Write-Output "Signing, installer lifecycle validation, service validation, macOS notarization, and GitHub Release upload are gated until explicit release approval."
