[scope.active_slice]
issue = "#217"
name = "daemon_bounded_artifact_repair_v29_corrective"
contract_change_allowed = true
production_code_allowed = true
private_benchmark_allowed = false
configured_private_roots_required = false
home_mixed_root_requires_explicit_user_authorization = true
home_mixed_root_authorized = true
unconfigured_private_run_terminal = "blocked_missing_configured_private_roots"
scope_exception = true
scope_exception_reason = "S807 is the user-prioritized local correctness train after a truthful evidence-only S806 checkpoint. A deterministic peer-reset witness proved that a request-local response write failure can terminate the resident daemon, while static inspection proved that the desktop had no runtime supervisor and that mutable resume-version identity plus non-atomic metadata/index publication could make one search result resolve to unavailable or changed detail content. Native testing then invalidated the v27 first-publication acceptance claim because an installed legacy corpus could remain repairing indefinitely. Post-merge installed strong-kill testing exposed the S808 control-plane correction: artifact recovery ran before IPC publication and the first worker tick bypassed the durable rescan interval, so a valid large corpus could repeatedly exceed the fixed startup deadline. S809 then proved that physical fulltext/vector publication locks could block the resident worker indefinitely while status continued to report repairing, repair backoff was anchored to attempt start, a pre-manifest v29 staging store could be stale, and the desktop restart budget was not durable across App generations. The v29 hard cut crosses daemon IPC, Tauri lifecycle, metadata copy-on-write migration and exact trigger authority, durable repair/restart ledgers, non-blocking fulltext/vector publication, import worker supervision and GUI diagnostics; these boundaries cannot be safely shipped as compatibility shims or dual truth sources. Issue #217 is the linked corrective owner; closed historical #138 remains only the local umbrella reference. S806 Windows ONNX work remains same-lane deferred and is not claimed complete. Public or committed artifacts may contain only synthetic fixtures and bounded redacted evidence. The explicitly authorized local v28 store may be read only as the source of a temporary APFS copy-on-write installed-acceptance witness; neither the source nor its copy, paths, contents or runtime artifacts may be committed or uploaded. This slice must preserve query semantics and privacy redlines and must not claim Windows H0, signing, updater, scale or product completion."
allowed_paths = [
  "ACTIVE_GOAL.toml",
  "PROGRESS.md",
  "03_next_goal_高性能本地检索GUI闭环/03_数据模型与存储协议.md",
  "03_next_goal_高性能本地检索GUI闭环/04_数据流与状态机.md",
