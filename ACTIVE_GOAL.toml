  "03_next_goal_高性能本地检索GUI闭环/08_失败模式与恢复策略.md",
  "03_next_goal_高性能本地检索GUI闭环/10_实施切片与验收门槛.md",
  "03_next_goal_高性能本地检索GUI闭环/14_W0_W1验收矩阵与证据协议.md",
  "03_next_goal_高性能本地检索GUI闭环/15_性能观测与Profiling工具链.md",
