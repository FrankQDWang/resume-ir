[workspace]
members = [
    "crates/core-domain",
    "crates/config",
    "crates/fs-crawler",
    "crates/meta-store",
    "crates/parser-common",
    "crates/parser-docx",
    "crates/parser-pdf",
    "crates/daemon",
    "crates/cli",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.86"
license = "UNLICENSED"
repository = "https://example.invalid/local-only/resume-ir"

[workspace.lints.rust]
unsafe_code = "forbid"
unused_must_use = "deny"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
