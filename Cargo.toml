[workspace]
members = [
    "crates/core-domain",
    "crates/config",
    "crates/meta-store",
    "crates/daemon",
    "crates/cli",
    "crates/fs-crawler",
    "crates/parser-common",
    "crates/parser-docx",
    "crates/parser-pdf",
    "crates/text-normalizer",
    "crates/sectionizer",
    "crates/extractor-rules",
    "crates/index-fulltext",
    "crates/search-planner",
    "crates/rank-fusion",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "UNLICENSED"
publish = false

[workspace.dependencies]
core-domain = { path = "crates/core-domain" }
config = { path = "crates/config" }
meta-store = { path = "crates/meta-store" }
fs-crawler = { path = "crates/fs-crawler" }
parser-common = { path = "crates/parser-common" }
parser-docx = { path = "crates/parser-docx" }
parser-pdf = { path = "crates/parser-pdf" }
text-normalizer = { path = "crates/text-normalizer" }
sectionizer = { path = "crates/sectionizer" }
extractor-rules = { path = "crates/extractor-rules" }
index-fulltext = { path = "crates/index-fulltext" }
search-planner = { path = "crates/search-planner" }
rank-fusion = { path = "crates/rank-fusion" }
serde = { version = "1.0", features = ["derive"] }
regex = "1.10"
sha2 = "0.10"
tempfile = "3.10"
thiserror = "1.0"
tantivy = "0.26.1"
uuid = { version = "1.8", features = ["v4", "serde"] }

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
dbg_macro = "deny"
