[workspace]
members = [
    "crates/core-domain",
    "crates/config",
    "crates/meta-store",
    "crates/daemon",
    "crates/cli",
    "crates/fs-crawler",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "UNLICENSED"
publish = false

[workspace.dependencies]
core-domain = { path = "crates/core-domain" }
config = { path = "crates/config" }
meta-store = { path = "crates/meta-store" }
fs-crawler = { path = "crates/fs-crawler" }
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
tempfile = "3.10"
thiserror = "1.0"
uuid = { version = "1.8", features = ["v4", "serde"] }

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
dbg_macro = "deny"
